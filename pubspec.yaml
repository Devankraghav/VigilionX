name: vigilion_x
description: "VigilionX - Mobile-Based Citizen Emergency Alert System with Real-Time Tracking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4

  # Maps & Location
  google_maps_flutter: ^2.12.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # State Management
  provider: ^6.1.5+1

  # UI & UX
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8

  # Local Notifications
  flutter_local_notifications: ^20.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  flutter_spinkit: ^5.2.1

  cupertino_icons: ^1.0.8
  battery_plus: ^7.0.0
  another_telephony: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf
        - asset: assets/fonts/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Urbanist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Urbanist-ExtraBold.ttf
          weight: 800
